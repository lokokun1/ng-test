name: Trigger Apply

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  AWS_REGION: "il-central-1"
  TF_LOG_CORE:     ${{ vars.TF_LOG_CORE }}
  TF_LOG_PROVIDER: ${{ vars.TF_LOG_PROVIDER }}
  TF_LOG:          ${{ vars.TF_LOG }}

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      int_changed: ${{ steps.check.outputs.int_changed }}
      dev_changed: ${{ steps.check.outputs.dev_changed }}
      stg_changed: ${{ steps.check.outputs.stg_changed }}
      prd_changed: ${{ steps.check.outputs.prd_changed }}
      int_dirs:    ${{ steps.check.outputs.int_dirs }}
      dev_dirs:    ${{ steps.check.outputs.dev_dirs }}
      stg_dirs:    ${{ steps.check.outputs.stg_dirs }}
      prd_dirs:    ${{ steps.check.outputs.prd_dirs }}
      int_k8s:     ${{ steps.check.outputs.int_k8s }}
      dev_k8s:     ${{ steps.check.outputs.dev_k8s }}
      stg_k8s:     ${{ steps.check.outputs.stg_k8s }}
      prd_k8s:     ${{ steps.check.outputs.prd_k8s }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed HCL files per environment
        id: check
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            BEFORE="HEAD~1"
          fi

          echo "Diffing $BEFORE -> HEAD"

          # Non-k8s terragrunt.hcl changes
          hcl_files=$(git diff --name-only --diff-filter=ACMRT "$BEFORE" HEAD \
            | grep "terragrunt\.hcl$" \
            | grep -v 'products/anan-magen/.*/shared/k8s/' || true)
          hcl_files=$(echo "$hcl_files" | sed '/^[[:space:]]*$/d')

          if [[ -z "$hcl_files" ]]; then
            echo "No terragrunt.hcl files modified."
            for env in int dev stg prd; do
              echo "${env}_changed=false" >> "$GITHUB_OUTPUT"
              echo "${env}_dirs="         >> "$GITHUB_OUTPUT"
            done
          else
            echo "Modified terragrunt.hcl files:"
            echo "$hcl_files"

            for env in int dev stg prd; do
              dirs=$(echo "$hcl_files" | grep "^products/anan-magen/il-central-1/${env}/" || true)

              if [[ -n "$dirs" ]]; then
                dirs_inline=$(echo "$dirs" | tr '\n' ' ' | xargs)
                echo "Found changes for ${env}: $dirs_inline"
                echo "${env}_changed=true"        >> "$GITHUB_OUTPUT"
                echo "${env}_dirs=${dirs_inline}" >> "$GITHUB_OUTPUT"
              else
                echo "No changes for ${env}."
                echo "${env}_changed=false" >> "$GITHUB_OUTPUT"
                echo "${env}_dirs="         >> "$GITHUB_OUTPUT"
              fi
            done
          fi

          # K8s changes per environment
          k8s_files=$(git diff --name-only --diff-filter=ACMRT "$BEFORE" HEAD \
            | grep '^products/anan-magen/il-central-1/.*/shared/k8s/.*\.hcl$' || true)
          k8s_files=$(echo "$k8s_files" | sed '/^[[:space:]]*$/d')

          if [[ -z "$k8s_files" ]]; then
            echo "No k8s .hcl files modified."
            for env in int dev stg prd; do
              echo "${env}_k8s=false" >> "$GITHUB_OUTPUT"
            done
          else
            echo "Modified k8s .hcl files:"
            echo "$k8s_files"

            for env in int dev stg prd; do
              k8s_dirs=$(echo "$k8s_files" \
                | grep "^products/anan-magen/il-central-1/${env}/shared/k8s/" || true)

              if [[ -n "$k8s_dirs" ]]; then
                echo "Found k8s changes for ${env}"
                echo "${env}_k8s=true"  >> "$GITHUB_OUTPUT"
              else
                echo "No k8s changes for ${env}."
                echo "${env}_k8s=false" >> "$GITHUB_OUTPUT"
              fi
            done
          fi

          echo "=== GITHUB_OUTPUT ==="
          cat "$GITHUB_OUTPUT"

  trigger_apply_INT:
    needs: detect_changes
    if: needs.detect_changes.outputs.int_changed == 'true'
    uses: ClickIDF/cap-infra-repo/.github/workflows/terragrunt-apply.yaml@main
    secrets: inherit
    with:
      ACCOUNT_ID_VAR:     "869935097196"
      check_dir:          "int"
      HUB_ACCOUNT_ID:     "014498638955"
      runner_ENV:         "dev"
      GITHUB_ENVIRONMENT: "int"

  trigger_apply_DEV:
    needs: detect_changes
    if: needs.detect_changes.outputs.dev_changed == 'true'
    uses: ClickIDF/cap-infra-repo/.github/workflows/terragrunt-apply.yaml@main
    secrets: inherit
    with:
      ACCOUNT_ID_VAR:     "619071333631"
      check_dir:          "dev"
      HUB_ACCOUNT_ID:     "014498638955"
      runner_ENV:         "dev"
      GITHUB_ENVIRONMENT: "dev"

  trigger_apply_STG:
    needs: detect_changes
    if: needs.detect_changes.outputs.stg_changed == 'true'
    uses: ClickIDF/cap-infra-repo/.github/workflows/terragrunt-apply.yaml@main
    secrets: inherit
    with:
      ACCOUNT_ID_VAR:     "140023400154"
      check_dir:          "stg"
      HUB_ACCOUNT_ID:     "014498643213"
      runner_ENV:         "prd"
      GITHUB_ENVIRONMENT: "stg"

  trigger_apply_PRD:
    needs: detect_changes
    if: needs.detect_changes.outputs.prd_changed == 'true'
    uses: ClickIDF/cap-infra-repo/.github/workflows/terragrunt-apply.yaml@main
    secrets: inherit
    with:
      ACCOUNT_ID_VAR:     "993825007188"
      check_dir:          "prd"
      HUB_ACCOUNT_ID:     "014498643213"
      runner_ENV:         "prd"
      GITHUB_ENVIRONMENT: "prd"
name: 'ECS Manager: Client Simulator'

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Execution mode
        required: true
        type: choice
        options: [ DESCRIBE, APPLY ]
        default: DESCRIBE
        
      environment:
        description: 'Target Environment'
        required: true
        type: choice
        options: [ DEV, STG, PRD ]

      app_mode:
        description: Application mode
        required: true
        type: choice
        options: [ None, Functional, Load-Test ]
        default: None


      task_count:
        description: Desired task count (None = describe only)
        required: true
        type: choice
        options: [ None, 1, 50, 100, 200 ]
        default: None

      log_level_web:
        description: Web log level
        required: true
        type: choice
        options: [ None, info, debug, trace, error ]
        default: None

      log_level_app:
        description: App log level
        required: true
        type: choice
        options: [ None, info, debug, trace, error ]
        default: None

      log_level_sql:
        description: SQL log level
        required: true
        type: choice
        options: [ None, info, debug, trace, error ]
        default: None

      log_level_root:
        description: Root log level
        required: true
        type: choice
        options: [ None, info, debug, trace, error ]
        default: None


permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: il-central-1
  INFRA_ACCOUNT_ID: "014498627927"
  BASE_PATH: products/anan-magen/il-central-1
  ECS_SERVICE_NAME: client-simulator-service
  AWS_PAGER: ""

jobs:
  manage-ecs:
    runs-on: codebuild-gh-runner-infrastructure-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      # ------------------------------------------------------------
      # 0. CHECKOUT + PYTHON
      # ------------------------------------------------------------
      - name: 1.0 - Checkout repository
        uses: actions/checkout@v4

      - name: 1.1 - Setup Python
        uses: actions/setup-python@v4

      # ------------------------------------------------------------
      # 1. ENV → ACCOUNT MAPPING
      # ------------------------------------------------------------
      - name: 2.0 - Resolve environment to account
        id: setup_vars
        run: |
          python3 .github/workflows/scaling-automation/find_cred.py \
            --environment ${{ inputs.environment }}
        env:
          ENV_MAPPING_SECRET: ${{ secrets.ENV_ACCOUNT_MAPPING }}

      # ------------------------------------------------------------
      # 2. AWS AUTH (Federated → Execution)
      # ------------------------------------------------------------
      - name: 3.0 - AWS Auth (Infra)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ env.INFRA_ACCOUNT_ID }}:role/wl-cicd-infrastructure-codebuild-role-${{ steps.setup_vars.outputs.account_id }}
          role-session-name: GitHubActions-Infra

      - name: 3.1 - AWS Auth (Execution)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ steps.setup_vars.outputs.account_id }}:role/wl-cicd-infrastructure-execution-role
          role-session-name: GitHubActions-Exec
          role-chaining: true

      # ------------------------------------------------------------
      # 3. Resolve ECS Cluster per ENV
      # ------------------------------------------------------------
      - name: Resolve ECS cluster
        id: cluster
        run: |
          case "${{ inputs.environment }}" in
            DEV) CLUSTER="ecs-development" ;;
            STG) CLUSTER="ecs-staging" ;;
            PRD) CLUSTER="ecs-prod" ;;
            *) echo "Unknown environment"; exit 1 ;;
          esac

          echo "Resolved cluster: $CLUSTER"
          echo "cluster=$CLUSTER" >> $GITHUB_OUTPUT
      
      # ------------------------------------------------------------
      # 4. Resolve ECS Service per ENV
      # ------------------------------------------------------------
      - name: Resolve ECS service
        id: service
        run: |
          SERVICE="client-simulator-service"
          echo "Resolved service: $SERVICE"
          echo "service=$SERVICE" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------
      # 5. INSTALL TERRAFORM + TERRAGRUNT
      # ------------------------------------------------------------
      - name: 5. - Install Terraform & Terragrunt
        run: |
          set -e

          TF_VERSION=1.9.7
          TG_VERSION=0.60.1

          echo "Checking tools"
          command -v curl
          command -v unzip || sudo yum install -y unzip

          echo "Installing Terraform ${TF_VERSION}"
          curl -sLo terraform.zip \
            https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip
          unzip -o terraform.zip
          sudo mv terraform /usr/local/bin/terraform

          echo "Installing Terragrunt ${TG_VERSION}"
          curl -sLo terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt

          echo "Verifying installs"
          terraform --version
          terragrunt --version

      # ------------------------------------------------------------
      # 6. DESCRIBE ECS (READ-ONLY, SAFE)
      # ------------------------------------------------------------
      - name: 6. - Describe ECS (Read Only)
        if: ${{ inputs.mode == 'DESCRIBE' }}
        run: |
          CLUSTER="${{ steps.cluster.outputs.cluster }}"
          SERVICE="${{ steps.service.outputs.service }}"

          {
            echo "### ECS Describe-only mode (${{ inputs.environment }})"
            echo ""
            echo "**Cluster:** $CLUSTER"
            echo "**Service:** $SERVICE"
            echo ""
          } | tee -a "$GITHUB_STEP_SUMMARY"

          # -------------------------------
          # Service state
          # -------------------------------
          SERVICE_STATE=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --output json \
            | grep -E '"status"|"desiredCount"|"runningCount"' \
            | sed -n '1,6p')

          echo "$SERVICE_STATE" | tee -a "$GITHUB_STEP_SUMMARY"

          # -------------------------------
          # Task definition ARN
          # -------------------------------
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --output json \
            | grep '"taskDefinition"' \
            | sed -n '1p' \
            | sed 's/.*"taskDefinition": "\(.*\)".*/\1/')

          echo "" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "**Application mode & log levels:**" | tee -a "$GITHUB_STEP_SUMMARY"

          # -------------------------------
          # Application image only
          # -------------------------------
          APP_IMAGE=$(aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --output json \
            | grep '"image"' \
            | grep -v firelens \
            | sed -n '1p' \
            | sed 's/.*"image": "\(.*\)".*/\1/')

          echo "- $APP_IMAGE" | tee -a "$GITHUB_STEP_SUMMARY"

          # -------------------------------
          # App mode + log levels
          # -------------------------------
          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --query 'taskDefinition.containerDefinitions[0].environment[?name==`IS_LOAD_TEST_VERSION` || starts_with(name, `LOG_LEVEL_`)]' \
            --output table | tee -a "$GITHUB_STEP_SUMMARY"

          # -------------------------------
          # Last service event
          # -------------------------------
          echo "" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "**Last service event:**" | tee -a "$GITHUB_STEP_SUMMARY"

          LAST_EVENT=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --output json \
            | grep '"message"' \
            | sed -n '1p' \
            | sed 's/.*"message": "\(.*\)".*/\1/')

          if [ -n "$LAST_EVENT" ]; then
            echo "- $LAST_EVENT" | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "- No recent events found" | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      # ------------------------------------------------------------
      # 7. Resolve environment folder
      # ------------------------------------------------------------
      - name: Resolve environment folder
        id: envdir
        run: |
          case "${{ inputs.environment }}" in
            DEV) ENV_DIR="dev" ;;
            STG) ENV_DIR="stg" ;;
            PRD) ENV_DIR="prd" ;;
            *) echo "Unknown environment: ${{ inputs.environment }}"; exit 1 ;;
          esac

          echo "Resolved env dir: $ENV_DIR"
          echo "env_dir=$ENV_DIR" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------
      # 8. TASK DEFINITION (Set App Mode & Log Levels)
      # ------------------------------------------------------------
      - name: 8. - ECS Task Definition (Set App Mode & Log Levels)
        if: ${{ inputs.mode == 'APPLY' }}
        run: |
          set -e

          cd ${{ env.BASE_PATH }}/${{ steps.envdir.outputs.env_dir }}/client-simulator/ecs-task-def

          echo "Selected app mode: ${{ inputs.app_mode }}"
          echo "Selected log levels:"
          echo "  WEB   = ${{ inputs.log_level_web }}"
          echo "  APP   = ${{ inputs.log_level_app }}"
          echo "  SQL   = ${{ inputs.log_level_sql }}"
          echo "  ROOT  = ${{ inputs.log_level_root }}"

          # ------------------------------------------------
          # Helper: update env var by name (HCL-safe)
          # ------------------------------------------------
          set_env_var () {
            VAR_NAME="$1"
            VAR_VALUE="$2"

            if [[ "$VAR_VALUE" == "None" ]]; then
              echo "Skipping $VAR_NAME (None)"
              return
            fi

            echo "Setting $VAR_NAME = $VAR_VALUE"

            # Guard: variable must exist
            if ! grep -q "name[[:space:]]*=[[:space:]]*\"$VAR_NAME\"" terragrunt.hcl; then
              echo "ERROR: $VAR_NAME not found in terragrunt.hcl"
              exit 1
            fi

            # Range-based replace (this is the FIX)
            sed -i "/name[[:space:]]*=[[:space:]]*\"$VAR_NAME\"/,/value[[:space:]]*=/ \
              s/value[[:space:]]*=[[:space:]]*\"[^\"]*\"/value = \"$VAR_VALUE\"/" \
              terragrunt.hcl

            # Verify change
            if ! grep -A1 "name[[:space:]]*=[[:space:]]*\"$VAR_NAME\"" terragrunt.hcl \
                | grep -q "value[[:space:]]*=[[:space:]]*\"$VAR_VALUE\""; then
              echo "ERROR: Failed to update $VAR_NAME"
              exit 1
            fi
          }

          echo "---- BEFORE ----"
          grep -n 'IS_LOAD_TEST_VERSION\|LOG_LEVEL_' terragrunt.hcl

          # ------------------------------------------------
          # App Mode
          # ------------------------------------------------
          if [[ "${{ inputs.app_mode }}" == "Load-Test" ]]; then
            set_env_var IS_LOAD_TEST_VERSION true
          elif [[ "${{ inputs.app_mode }}" == "Functional" ]]; then
            set_env_var IS_LOAD_TEST_VERSION false
          fi

          # ------------------------------------------------
          # Log Levels
          # ------------------------------------------------
          set_env_var LOG_LEVEL_WEB   "${{ inputs.log_level_web }}"
          set_env_var LOG_LEVEL_APP   "${{ inputs.log_level_app }}"
          set_env_var LOG_LEVEL_SQL   "${{ inputs.log_level_sql }}"
          set_env_var LOG_LEVEL_ROOT "${{ inputs.log_level_root }}"

          echo "---- AFTER ----"
          grep -A1 -E 'IS_LOAD_TEST_VERSION|LOG_LEVEL_' terragrunt.hcl

          terragrunt apply --terragrunt-non-interactive -auto-approve

      # ------------------------------------------------------------
      # 9. SERVICE SCALE (ONLY WHEN NOT NONE)
      # ------------------------------------------------------------
      - name: 9. - ECS Service Scale
        if: ${{ inputs.mode == 'APPLY' && inputs.task_count != 'None' }}
        run: |
          set -e

          SERVICE_DIR="${{ env.BASE_PATH }}/${{ steps.envdir.outputs.env_dir }}/client-simulator/ecs-service-task"
          cd "$SERVICE_DIR"

          echo "Updating desired_count to: ${{ inputs.task_count }}"

          sed -i \
            's/desired_count *= *.*/desired_count = ${{ inputs.task_count }}/' \
            terragrunt.hcl

          echo "desired_count after change:"
          grep desired_count terragrunt.hcl

          terragrunt apply --terragrunt-non-interactive -auto-approve
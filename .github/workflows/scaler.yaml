name: 'EKS Scaler'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        type: choice
        options: [ INT, DEV, STG, PRD ]
      action:
        description: 'FinOps Action to Trigger NOW'
        required: true
        type: choice
        options:
        - start
        - stop
      nodes_count:
        description: 'Update START capacity (None = no change)'
        required: true
        type: choice
        options: [ 'None', '2', '4', '6', '8', '10' ]
        default: 'None'
      stop_behavior:
        description: 'Update STOP capacity (None = no change)'
        required: true
        type: choice
        options: [ 'None', '0', '2', '4', '6', '8', '10' ]
        default: 'None'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "il-central-1"

jobs:
  scale-environment:
    runs-on: codebuild-gh-runner-infrastructure-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
    - name: 0.1 - Checkout repository
      uses: actions/checkout@v3

    - name: 0.2 - Setup Python
      uses: actions/setup-python@v4

    - name: 0.3 - Map Environment to Account ID
      id: setup_vars
      run: |
        python3 .github/workflows/scaling-automation/find_cred.py --environment ${{ inputs.environment }} 
      env:
        ENV_MAPPING_SECRET: ${{ secrets.ENV_ACCOUNT_MAPPING }}

    # --- Phase 0: Authentication ---

    - name: 0.4 - Configure AWS Credentials (Infra)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ env.AWS_REGION }}
        role-to-assume: arn:aws:iam::014498627927:role/wl-cicd-infrastructure-codebuild-role-${{ steps.setup_vars.outputs.account_id }}
        role-session-name: GitHubActions-Auth

    - name: 0.5 - Configure AWS Credentials (Execution)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ env.AWS_REGION }}
        role-to-assume: arn:aws:iam::${{ steps.setup_vars.outputs.account_id }}:role/wl-cicd-infrastructure-execution-role
        role-session-name: GitHubActions-Scaler
        role-chaining: true

    # --- Phase 1: Selective Configuration Updates ---

    - name: 1.1 - Update START Capacity
      if: ${{ inputs.nodes_count != 'None' }}
      run: |
        echo "Updating START_COUNT to ${{ inputs.nodes_count }}"
        aws lambda get-function-configuration --function-name finops-resource-scheduler --query 'Environment.Variables' --output json > current_vars.json
        jq -c '. + {"START_COUNT": "${{ inputs.nodes_count }}"} | {"Variables": .}' current_vars.json > start_env.json
        aws lambda update-function-configuration --function-name finops-resource-scheduler --environment file://start_env.json
    - name: 1.2 - Update STOP Capacity
      if: ${{ inputs.stop_behavior != 'None' }}
      run: |
        echo "Updating STOP_COUNT to ${{ inputs.stop_behavior }}"
        aws lambda get-function-configuration --function-name finops-resource-scheduler --query 'Environment.Variables' --output json > current_vars.json
        jq -c '. + {"STOP_COUNT": "${{ inputs.stop_behavior }}"} | {"Variables": .}' current_vars.json > stop_env.json
        aws lambda update-function-configuration --function-name finops-resource-scheduler --environment file://stop_env.json

    - name: 2.1 - Invoke FinOps Lambda
      run: |
        echo "Invoking Lambda with action: ${{ inputs.action }}"
        aws lambda invoke \
          --function-name finops-resource-scheduler \
          --payload '{"action": "${{ inputs.action }}"}' \
          --cli-binary-format raw-in-base64-out \
          response.json
        echo "Lambda Response:"
        cat response.json

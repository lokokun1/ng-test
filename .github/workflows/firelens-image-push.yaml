name: Upload FireLens Image to Prod ECR

on:
  workflow_dispatch:
    inputs:
      ACCOUNT_ID_VAR:
        description: "993825007188"
        required: true
permissions:
  contents: read
  id-token: write # This is required for requesting the JWT
  pull-requests: write

env:
  SOURCE_IMAGE: public.ecr.aws/aws-observability/aws-for-fluent-bit:latest
  PROD_ACCOUNT: ${{ inputs.ACCOUNT_ID_VAR }}
  IMAGE_NAME: images/firelens
  TAG: latest
  AWS_REGION: il-central-1
  INFRA_ACCOUNT_ID: "014498627927"

jobs:
  push-firelens:
    runs-on: codebuild-gh-runner-infrastructure-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
    - name: Configure aws credentials - Federated Role
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: il-central-1
        role-to-assume: arn:aws:iam::${{ env.INFRA_ACCOUNT_ID }}:role/wl-cicd-infrastructure-codebuild-role-${{ inputs.ACCOUNT_ID_VAR }}
        role-session-name: GitHubActions-Test

    - name: Configure AWS Credentials - Infra Execution Role
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ env.AWS_REGION }}
        role-to-assume: arn:aws:iam::${{ inputs.ACCOUNT_ID_VAR }}:role/wl-cicd-infrastructure-execution-role
        role-chaining: true
        role-session-name: GitHubActions-Test

    - name: Login to prod ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $PROD_ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com

    - name: Pull, tag, and push FireLens image
      run: |
        docker pull $SOURCE_IMAGE

        docker tag \
          $SOURCE_IMAGE \
          $PROD_ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME:$TAG

        docker push \
          $PROD_ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME:$TAG
  push-alertmanager:
    runs-on: codebuild-gh-runner-infrastructure-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
    - name: Configure aws credentials - Federated Role
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: il-central-1
        role-to-assume: arn:aws:iam::${{ env.INFRA_ACCOUNT_ID }}:role/wl-cicd-infrastructure-codebuild-role-${{ inputs.ACCOUNT_ID_VAR }}
        role-session-name: GitHubActions-Test

    - name: Configure AWS Credentials - Infra Execution Role
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ env.AWS_REGION }}
        role-to-assume: arn:aws:iam::${{ inputs.ACCOUNT_ID_VAR }}:role/wl-cicd-infrastructure-execution-role
        role-chaining: true
        role-session-name: GitHubActions-Test

    - name: Login to prod ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $PROD_ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com

    - name: Pull, tag, and push Alertmanager image
      run: |
        SOURCE_IMAGE=quay.io/prometheus/alertmanager:v0.27.0
        IMAGE_NAME=prometheus/alertmanager
        TAG=v0.27.0

        docker pull $SOURCE_IMAGE
        docker tag $SOURCE_IMAGE $PROD_ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME:$TAG
        docker push $PROD_ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME:$TAG
